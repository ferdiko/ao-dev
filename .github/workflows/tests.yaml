name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  non-billable:
    name: Non-Billable Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
        submodules: recursive
        token: ${{ secrets.GH_TOKEN }}

    - name: Setup test environment
      uses: ./.github/actions/setup-test-environment

    - name: Run tests
      run: |
        uv run pytest -v -s tests/non_billable/

  web-app:
    name: Web App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/web_app

    steps:
    - uses: actions/checkout@v5

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: ui/web_app/package-lock.json

    - name: Install UI workspace dependencies
      run: npm ci

    - name: Run web app tests
      run: npm run test

    - name: Run web app lint
      run: npm run lint

    - name: Build web app
      run: npm run build
