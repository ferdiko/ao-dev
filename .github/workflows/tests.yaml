name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  non-billable:
    name: Non-Billable Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive
        token: ${{ secrets.GH_TOKEN }}

    - name: Setup test environment
      uses: ./.github/actions/setup-test-environment

    - name: Setup isolated test database
      run: mkdir -p ~/.cache/ao/tests/non-billable

    - name: Launch main server
      run: |
        export DB_PATH="$HOME/.cache/ao/tests/non-billable"
        export PYTHON_PORT=5959
        uv run ao-server start

    - name: Run tests
      env:
        DB_PATH: ~/.cache/ao/tests/non-billable
        PYTHON_PORT: 5959
      run: |
        uv run pytest -v -s tests/non_billable/

    - name: Clean up
      if: always()
      run: rm -rf ~/.cache/ao/tests/non-billable

  web-app:
    name: Web App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/user_interfaces/web_app

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: src/user_interfaces/web_app/package-lock.json

    - name: Install UI workspace dependencies
      run: npm ci

    - name: Run web app tests
      run: npm run test

    - name: Run web app lint
      run: npm run lint

    - name: Build web app
      run: npm run build
