<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>web_app Preview</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --sidebar-width:240px;
  --color-bg:#fafafa; --color-surface:#ffffff; --color-border:#e5e7eb;
  --color-text:#111827; --color-text-secondary:#6b7280; --color-text-muted:#9ca3af;
  --color-primary:#2563eb; --color-primary-hover:#1d4ed8; --color-primary-light:#eff6ff;
  --color-success:#16a34a; --color-error:#dc2626; --color-running:#2563eb;
  --color-sidebar-bg:#111827; --color-sidebar-text:#d1d5db;
  --color-sidebar-text-active:#ffffff; --color-sidebar-hover:#1f2937;
  --color-sidebar-section:#9ca3af;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  font-size:14px; color:var(--color-text); line-height:1.5;
}
body { background:var(--color-bg); min-height:100vh; }
#app { display:flex; min-height:100vh; }
a { color:inherit; text-decoration:none; cursor:pointer; }

/* Sidebar */
.sidebar { width:var(--sidebar-width); background:var(--color-sidebar-bg); color:var(--color-sidebar-text); display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:100; }
.sidebar-header { padding:16px 16px 8px; border-bottom:1px solid rgba(255,255,255,0.08); }
.sidebar-org { display:flex; align-items:center; gap:10px; padding:4px 0; cursor:pointer; }
.sidebar-org:hover { opacity:0.85; }
.sidebar-org-icon { width:28px; height:28px; background:var(--color-primary); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; color:white; }
.sidebar-org-name { font-size:13px; font-weight:600; color:var(--color-sidebar-text-active); }
.sidebar-org-sub { font-size:11px; color:var(--color-sidebar-section); }
.sidebar-project-selector { margin-top:8px; padding:6px 10px; background:var(--color-sidebar-hover); border-radius:6px; font-size:12px; color:var(--color-sidebar-text); cursor:pointer; display:flex; align-items:center; justify-content:space-between; }
.sidebar-project-selector:hover { background:rgba(255,255,255,0.1); }
.sidebar-nav { flex:1; padding:8px 0; overflow-y:auto; }
.sidebar-section { padding:16px 16px 4px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; color:var(--color-sidebar-section); }
.sidebar-item { display:flex; align-items:center; gap:10px; padding:7px 16px; font-size:13px; color:var(--color-sidebar-text); cursor:pointer; border:none; background:none; width:100%; text-align:left; }
.sidebar-item:hover { background:var(--color-sidebar-hover); color:var(--color-sidebar-text-active); }
.sidebar-item.active { background:var(--color-sidebar-hover); color:var(--color-sidebar-text-active); font-weight:500; }
.sidebar-footer { padding:12px 16px; border-top:1px solid rgba(255,255,255,0.08); }
.sidebar-user { display:flex; align-items:center; gap:10px; }
.sidebar-avatar { width:30px; height:30px; background:#f59e0b; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; color:white; }
.sidebar-user-name { font-size:13px; font-weight:500; color:var(--color-sidebar-text-active); }
.sidebar-user-email { font-size:11px; color:var(--color-sidebar-section); }

/* Main */
.main-content { flex:1; margin-left:var(--sidebar-width); min-height:100vh; display:flex; flex-direction:column; }

/* Breadcrumb */
.breadcrumb { display:flex; align-items:center; gap:6px; padding:12px 24px; font-size:13px; color:var(--color-text-secondary); border-bottom:1px solid var(--color-border); background:var(--color-surface); }
.breadcrumb a:hover { color:var(--color-primary); }
.breadcrumb-sep { color:var(--color-text-muted); }
.breadcrumb-current { color:var(--color-text); font-weight:500; }

/* Org page */
.org-page { flex:1; padding:32px; }
.org-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
.org-title { font-size:22px; font-weight:600; }
.org-subtitle { font-size:13px; color:var(--color-text-secondary); margin-top:2px; }
.project-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
.project-card { background:var(--color-surface); border:1px solid var(--color-border); border-radius:8px; padding:20px; cursor:pointer; transition:border-color 0.15s,box-shadow 0.15s; }
.project-card:hover { border-color:var(--color-primary); box-shadow:0 1px 4px rgba(37,99,235,0.1); }
.project-card-name { font-size:16px; font-weight:600; margin-bottom:4px; }
.project-card-desc { font-size:13px; color:var(--color-text-secondary); margin-bottom:16px; }
.project-card-meta { display:flex; gap:20px; font-size:12px; color:var(--color-text-muted); }
.project-card-meta-item { display:flex; align-items:center; gap:4px; }
.meta-val { font-weight:600; color:var(--color-text-secondary); }

/* Project page */
.project-page { flex:1; display:flex; flex-direction:column; }
.project-page-header { padding:20px 24px; border-bottom:1px solid var(--color-border); background:var(--color-surface); display:flex; align-items:center; justify-content:space-between; }
.project-page-title { font-size:18px; font-weight:600; }
.btn { padding:6px 14px; border-radius:6px; font-size:13px; font-weight:500; cursor:pointer; border:1px solid var(--color-border); background:var(--color-surface); color:var(--color-text); }
.btn:hover { background:var(--color-bg); }
.btn-primary { background:var(--color-primary); color:white; border-color:var(--color-primary); }
.btn-primary:hover { background:var(--color-primary-hover); }

.project-landing { flex:1; display:grid; grid-template-columns:1fr 1fr; }
.project-landing-col { padding:24px; overflow-y:auto; }
.project-landing-col:first-child { border-right:1px solid var(--color-border); }
.section-title { font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; color:var(--color-text-secondary); margin-bottom:16px; }

/* Runs table */
.runs-table { width:100%; border-collapse:collapse; }
.runs-table th { text-align:left; padding:8px 12px; font-size:12px; font-weight:600; color:var(--color-text-secondary); border-bottom:1px solid var(--color-border); white-space:nowrap; }
.runs-table td { padding:10px 12px; font-size:13px; border-bottom:1px solid var(--color-border); white-space:nowrap; }
.runs-table tr:hover td { background:var(--color-primary-light); }
.runs-table tr { cursor:pointer; }
.status-badge { display:inline-flex; align-items:center; gap:5px; padding:2px 8px; border-radius:10px; font-size:12px; font-weight:500; }
.status-badge.running { background:#eff6ff; color:var(--color-running); }
.status-badge.finished { background:#f0fdf4; color:var(--color-success); }
.status-badge.failed { background:#fef2f2; color:var(--color-error); }
.status-dot { width:6px; height:6px; border-radius:50%; background:currentColor; display:inline-block; }
.status-badge.running .status-dot { animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* Stats */
.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:24px; }
.stat-card { background:var(--color-surface); border:1px solid var(--color-border); border-radius:8px; padding:16px; }
.stat-card-label { font-size:12px; color:var(--color-text-secondary); margin-bottom:4px; }
.stat-card-value { font-size:24px; font-weight:700; }
.stat-card-change { font-size:12px; color:var(--color-success); margin-top:2px; }
.chart-placeholder { background:var(--color-surface); border:1px solid var(--color-border); border-radius:8px; height:200px; display:flex; align-items:center; justify-content:center; color:var(--color-text-muted); font-size:13px; text-align:center; }
.info-row { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--color-text-secondary); margin-bottom:8px; }
</style>
</head>
<body>
<div id="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar"></aside>
  <!-- MAIN -->
  <main class="main-content" id="main"></main>
</div>

<script>
const projects = [
  { id:"proj-1", name:"sovera DB", desc:"Main database agent pipeline for Sovera", created:"2025-11-03", modified:"2026-03-12", runs:342, users:3 },
  { id:"proj-2", name:"bird-bench Eval", desc:"Text-to-SQL evaluation on BIRD benchmark", created:"2026-01-15", modified:"2026-03-10", runs:1205, users:2 },
  { id:"proj-3", name:"customer-support-agent", desc:"Multi-turn customer support chatbot pipeline", created:"2026-02-20", modified:"2026-03-11", runs:89, users:1 },
  { id:"proj-4", name:"code-review-assistant", desc:"Automated code review with chain-of-thought", created:"2026-03-01", modified:"2026-03-08", runs:24, users:2 },
];
const runs = [
  { name:"Run 47", status:"finished", time:"2026-03-12 10:36:34", dur:"12.7s", nodes:6, ver:"Version Mar 12, 10:36" },
  { name:"Run 46", status:"finished", time:"2026-03-12 09:15:02", dur:"8.3s", nodes:4, ver:"Version Mar 12, 9:15" },
  { name:"Run 45", status:"failed", time:"2026-03-11 22:48:36", dur:"3.1s", nodes:2, ver:"Version Mar 11, 22:48" },
  { name:"Run 44", status:"running", time:"2026-03-12 10:45:00", dur:"—", nodes:3, ver:"Version Mar 12, 10:45" },
  { name:"Run 43", status:"finished", time:"2026-03-11 18:22:11", dur:"15.4s", nodes:8, ver:"Version Mar 11, 18:22" },
  { name:"Run 42", status:"finished", time:"2026-03-11 16:05:44", dur:"9.8s", nodes:5, ver:"Version Mar 11, 16:05" },
  { name:"Run 41", status:"failed", time:"2026-03-11 14:30:19", dur:"1.2s", nodes:1, ver:"Version Mar 11, 14:30" },
  { name:"Run 40", status:"finished", time:"2026-03-11 11:17:55", dur:"22.1s", nodes:12, ver:"Version Mar 11, 11:17" },
];

let currentView = 'org';
let currentProject = null;

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  const navItems = currentProject ? `
    <div class="sidebar-project-selector" onclick="showOrg()">${currentProject.name} <span style="font-size:10px">▼</span></div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">Observability</div>
      <button class="sidebar-item active"><span style="width:16px">▶</span> Runs</button>
      <div class="sidebar-section">⬡ ${currentProject.name}</div>
      <button class="sidebar-item"><span style="width:16px">◉</span> Runs</button>
      <button class="sidebar-item"><span style="width:16px">📖</span> Onboarding</button>
      <div class="sidebar-section">Evaluations</div>
      <button class="sidebar-item"><span style="width:16px">⚠</span> AI Failure Analysis</button>
      <button class="sidebar-item"><span style="width:16px">🏷</span> Failure Taxonomy</button>
      <div class="sidebar-section">Settings</div>
      <button class="sidebar-item"><span style="width:16px">⚙</span> Project Settings</button>
      <button class="sidebar-item"><span style="width:16px">?</span> Support</button>
      <button class="sidebar-item"><span style="width:16px">👥</span> Collaboration</button>
    </nav>
  ` : `</div><nav class="sidebar-nav">
      <div class="sidebar-section">Organization</div>
      <button class="sidebar-item active"><span style="width:16px">📊</span> Projects</button>
    </nav>`;

  sb.innerHTML = `
    <div class="sidebar-header">
      <div class="sidebar-org" onclick="showOrg()">
        <div class="sidebar-org-icon">S</div>
        <div><div class="sidebar-org-name">Sovera DB Labs</div><div class="sidebar-org-sub">powered by sovera-labs</div></div>
      </div>
      ${navItems}
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar">JB</div>
        <div><div class="sidebar-user-name">Julian Buechel</div><div class="sidebar-user-email">julian@sovera-labs.com</div></div>
      </div>
    </div>`;
}

function renderOrg() {
  const m = document.getElementById('main');
  m.innerHTML = `
    <div class="breadcrumb"><span class="breadcrumb-current">Organization</span></div>
    <div class="org-page">
      <div class="org-header">
        <div><h1 class="org-title">Projects</h1><p class="org-subtitle">${projects.length} projects in Sovera DB Labs</p></div>
        <button class="btn btn-primary">+ New Project</button>
      </div>
      <div class="project-grid">
        ${projects.map(p => `
          <div class="project-card" onclick="showProject('${p.id}')">
            <div class="project-card-name">${p.name}</div>
            <div class="project-card-desc">${p.desc}</div>
            <div class="project-card-meta">
              <div class="project-card-meta-item">▶ <span class="meta-val">${p.runs}</span> runs</div>
              <div class="project-card-meta-item">👥 <span class="meta-val">${p.users}</span> users</div>
              <div class="project-card-meta-item">📅 ${p.created}</div>
              <div class="project-card-meta-item">🕐 ${p.modified}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
}

function renderProject(p) {
  const succ = runs.filter(r=>r.status==='finished').length;
  const fail = runs.filter(r=>r.status==='failed').length;
  const running = runs.filter(r=>r.status==='running').length;
  const m = document.getElementById('main');
  m.innerHTML = `
    <div class="breadcrumb">
      <a onclick="showOrg()">Organization</a>
      <span class="breadcrumb-sep">/</span>
      <span class="breadcrumb-current">${p.name}</span>
    </div>
    <div class="project-page-header">
      <div class="project-page-title">${p.name}</div>
      <button class="btn btn-primary">▶ New Run</button>
    </div>
    <div class="project-landing">
      <div class="project-landing-col">
        <div class="section-title">Recent Runs</div>
        <table class="runs-table">
          <thead><tr><th>Name</th><th>Status</th><th>Time</th><th>Duration</th><th>Nodes</th><th>Version</th></tr></thead>
          <tbody>
            ${runs.map(r => `<tr>
              <td style="font-weight:500">${r.name}</td>
              <td><span class="status-badge ${r.status}"><span class="status-dot"></span>${r.status}</span></td>
              <td style="color:var(--color-text-secondary)">${r.time}</td>
              <td>${r.dur}</td>
              <td>${r.nodes}</td>
              <td style="color:var(--color-text-muted);font-size:12px">${r.ver}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div class="project-landing-col">
        <div class="section-title">Overview</div>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-card-label">Total Runs</div><div class="stat-card-value">${p.runs}</div><div class="stat-card-change">+12 this week</div></div>
          <div class="stat-card"><div class="stat-card-label">Success Rate</div><div class="stat-card-value">${Math.round(succ/(succ+fail)*100)}%</div><div class="stat-card-change">${succ} passed, ${fail} failed</div></div>
          <div class="stat-card"><div class="stat-card-label">Running</div><div class="stat-card-value">${running}</div></div>
          <div class="stat-card"><div class="stat-card-label">Users</div><div class="stat-card-value">${p.users}</div></div>
        </div>
        <div class="section-title">Activity (Last 7 Days)</div>
        <div class="chart-placeholder"><div>📊 Run activity chart<br><span style="font-size:11px;margin-top:4px">Visualization coming soon</span></div></div>
        <div class="section-title" style="margin-top:24px">Quick Info</div>
        <div class="info-row">🕐 Created: <strong>${p.created}</strong></div>
        <div class="info-row">🕐 Last modified: <strong>${p.modified}</strong></div>
        <div class="info-row">🔀 Latest version: <strong>${runs[0].ver}</strong></div>
      </div>
    </div>`;
}

function showOrg() {
  currentView = 'org'; currentProject = null;
  renderSidebar(); renderOrg();
}
function showProject(id) {
  currentProject = projects.find(p=>p.id===id);
  currentView = 'project';
  renderSidebar(); renderProject(currentProject);
}

showOrg();
</script>
</body>
</html>
